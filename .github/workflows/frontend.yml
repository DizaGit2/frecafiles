name: Frontend Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p src/environments
          INVITE_FUNCTION_URL="${SUPABASE_URL%/}/functions/v1/invite-client"
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: false,
            supabaseUrl: '${SUPABASE_URL}',
            supabaseAnonKey: '${SUPABASE_ANON_KEY}',
            inviteFunctionUrl: '${INVITE_FUNCTION_URL}'
          };
          EOF
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            supabaseUrl: '${SUPABASE_URL}',
            supabaseAnonKey: '${SUPABASE_ANON_KEY}',
            inviteFunctionUrl: '${INVITE_FUNCTION_URL}'
          };
          EOF

      - name: Build (production)
        run: npm run build -- --configuration=production --base-href=/frecafiles/

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/freca-files-prod/index.html dist/freca-files-prod/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/freca-files-prod

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
